spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  sql:
    init:
      mode: never
  
  h2:
    console:
      enabled: true
  
  # 큐 설정 (테스트용)
  queue:
    capacity: 100
    consumer-threads: 1
    poll-timeout: 100
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.news.stream: DEBUG
    org.springframework.web: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      show-components: always

server:
  port: 0
