spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/news_stream}
    username: ${DATABASE_USERNAME:news_user}
    password: ${DATABASE_PASSWORD:news_password}
  
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}

logging:
  level:
    com.alert.news: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    root: WARN
  file:
    name: logs/news-stream-service.log
    max-size: 100MB
    max-history: 90

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
      show-components: never

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
