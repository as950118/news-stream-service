spring:
  application:
    name: news-stream-service
  
  profiles:
    active: dev
  
  datasource:
    url: jdbc:postgresql://localhost:5433/alert_news
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 20
  
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
  
  redis:
    host: localhost
    port: 6380
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  
  websocket:
    max-text-message-size: 8192
    max-binary-message-size: 8192

# Swagger/OpenAPI 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    filter: true

server:
  port: 8080
  servlet:
    context-path: /
  
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  metrics:
    export:
      prometheus:
        enabled: true

# JWT 설정
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-make-it-long-enough-for-security}
  expiration-hours: ${JWT_EXPIRATION_HOURS:24}

# 고객사 설정
customer:
  max-connections-per-customer: ${MAX_CONNECTIONS_PER_CUSTOMER:1}

# 큐 설정
queue:
  capacity: ${QUEUE_CAPACITY:1000}
  consumer-threads: ${QUEUE_CONSUMER_THREADS:2}
  poll-timeout: ${QUEUE_POLL_TIMEOUT:1000}

# 뉴스 서비스 설정
news:
  batch:
    size: ${NEWS_BATCH_SIZE:100}
    delay: ${NEWS_BATCH_DELAY:1000}
    consumer-threads: ${NEWS_BATCH_CONSUMER_THREADS:2}
    queue-capacity: ${NEWS_BATCH_QUEUE_CAPACITY:100}
  schedule:
    initial-delay: ${NEWS_SCHEDULE_INITIAL_DELAY:60000}
    fixed-delay: ${NEWS_SCHEDULE_FIXED_DELAY:300000}
  retry:
    max-attempts: ${NEWS_RETRY_MAX_ATTEMPTS:3}
    delay: ${NEWS_RETRY_DELAY:5000}

# WebSocket 설정
websocket:
  endpoint: /ws
  max-connections-per-customer: ${WEBSOCKET_MAX_CONNECTIONS_PER_CUSTOMER:1}
  message-size-limit: ${WEBSOCKET_MESSAGE_SIZE_LIMIT:65536}
  send-buffer-size: ${WEBSOCKET_SEND_BUFFER_SIZE:524288}
  send-time-limit: ${WEBSOCKET_SEND_TIME_LIMIT:20000}

logging:
  level:
    com.news.stream: DEBUG
    com.news.stream.controller: DEBUG
    com.news.stream.queue: DEBUG
    com.news.stream.websocket: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/news-stream-service.log
    max-size: 10MB
    max-history: 30
