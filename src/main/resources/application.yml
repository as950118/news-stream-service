spring:
  application:
    name: news-stream-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/alert_news?autoCommit=false&readOnly=false
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      data-source-properties:
        autoCommit: false
        readOnly: false
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        connection:
          provider_disables_autocommit: true
          autoCommit: false
          isolation: READ_COMMITTED
        jdbc:
          batch_size: 20
          fetch_size: 20
          batch_versioned_data: true
          order_inserts: true
          order_updates: true
  
  sql:
    init:
      mode: never
      # schema-locations: classpath:db/schema.sql
      # data-locations: classpath:db/data.sql
  
  websocket:
    max-text-message-size: 8192
    max-binary-message-size: 8192
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

# Swagger/OpenAPI 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    filter: true

server:
  port: 8080
  servlet:
    context-path: /
  
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    web:
      server:
        request:
          autotime:
            enabled: true
            percentiles: 0.5,0.95,0.99

# JWT 설정
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-make-it-long-enough-for-security}
  expiration-hours: ${JWT_EXPIRATION_HOURS:24}

# 고객사 설정
customer:
  max-connections-per-customer: ${MAX_CONNECTIONS_PER_CUSTOMER:1}

# 큐 설정
queue:
  capacity: ${QUEUE_CAPACITY:1000}
  consumer-threads: ${QUEUE_CONSUMER_THREADS:2}
  poll-timeout: ${QUEUE_POLL_TIMEOUT:1000}

# 뉴스 서비스 설정
news:
  batch:
    size: ${NEWS_BATCH_SIZE:100}
    delay: ${NEWS_BATCH_DELAY:1000}
    consumer-threads: ${NEWS_BATCH_CONSUMER_THREADS:2}
    queue-capacity: ${NEWS_BATCH_QUEUE_CAPACITY:100}
  schedule:
    initial-delay: ${NEWS_SCHEDULE_INITIAL_DELAY:60000}
    fixed-delay: ${NEWS_SCHEDULE_FIXED_DELAY:300000}
  retry:
    max-attempts: ${NEWS_RETRY_MAX_ATTEMPTS:3}
    delay: ${NEWS_RETRY_DELAY:5000}

# 동시성 최적화 설정
concurrency:
  core-pool-size: ${CORE_POOL_SIZE:4}
  max-pool-size: ${MAX_POOL_SIZE:8}
  queue-capacity: ${QUEUE_CAPACITY:100}

# 캐시 설정
cache:
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: ${REDIS_TIMEOUT:2000}
    database: ${REDIS_DATABASE:0}

# 데이터베이스 최적화 설정
database:
  hikari:
    maximum-pool-size: ${DB_MAX_POOL_SIZE:20}
    minimum-idle: ${DB_MIN_IDLE:5}
    connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
    idle-timeout: ${DB_IDLE_TIMEOUT:300000}
    max-lifetime: ${DB_MAX_LIFETIME:1800000}

# 성능 최적화 설정
performance:
  profiling:
    enabled: ${PERFORMANCE_PROFILING:true}
    threshold:
      warning: ${PERFORMANCE_WARNING_THRESHOLD:500}
      error: ${PERFORMANCE_ERROR_THRESHOLD:1000}

# WebSocket 설정
websocket:
  endpoint: /ws
  max-connections-per-customer: ${WEBSOCKET_MAX_CONNECTIONS_PER_CUSTOMER:1}
  message-size-limit: ${WEBSOCKET_MESSAGE_SIZE_LIMIT:65536}
  send-buffer-size: ${WEBSOCKET_SEND_BUFFER_SIZE:524288}
  send-time-limit: ${WEBSOCKET_SEND_TIME_LIMIT:20000}

logging:
  level:
    com.news.stream: INFO
    com.news.stream.controller: INFO
    com.news.stream.queue: INFO
    com.news.stream.websocket: INFO
    com.news.stream.optimization: DEBUG
    org.springframework.web: WARN
    org.springframework.web.socket: WARN
    org.springframework.messaging: WARN
    org.springframework.boot.actuator: INFO
    org.springframework.cache: DEBUG
    org.springframework.data.redis: DEBUG
    io.micrometer: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/news-stream-service.log
    max-size: 100MB
    max-history: 30

# Prometheus 설정
prometheus:
  enabled: true
  endpoint: /actuator/prometheus
